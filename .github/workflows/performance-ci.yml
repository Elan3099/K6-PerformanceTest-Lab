name: K6 Performance CI
on:
  push:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Start API
        run: |
          npm install express
          node app.js & # Menjalankan API di background
          echo "Waiting for API to start..."
          sleep 10 # Memberi waktu 10 detik agar API benar-benar siap

      - name: Verify API is Live
        run: curl -v http://localhost:3000/api/v1/resource

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js