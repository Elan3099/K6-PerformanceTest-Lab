name: K6 Performance CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and Run API
        run: |
          npm install
          node app.js & 
          # Tunggu hingga port 3000 benar-benar aktif
          npx wait-on http://localhost:3000 

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
          # Trick: Gunakan host.docker.internal untuk akses dari container k6 ke runner host
          flags: --add-host=host.docker.internal:host-gateway