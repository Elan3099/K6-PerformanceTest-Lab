name: K6 Performance CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build and Run API with Docker
        run: |
          docker build -t my-api .
          # Gunakan --network host agar port 3000 terbuka di level runner
          docker run -d --network host --name api-container my-api
          # Beri waktu sedikit lebih lama agar API benar-benar siap
          sleep 10 

      - name: Run k6 Load Test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: load-test.js
          # Tambahkan flag agar container k6 juga menggunakan network host
          flags: --network host